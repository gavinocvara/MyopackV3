; ───────────────────────────────────────────────────────────────
; MyoPack ESP32 Firmware — PlatformIO config
; Target: ESP32-WROOM-32E-N8 (matches PCB silkscreen)
; Bench/dev target: ESP32 DevKit v1 (pin-compatible for all signals)
; ───────────────────────────────────────────────────────────────

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Optimizations
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DMP_FIRMWARE_VERSION=\"1.0.0\"

lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.0.4
    knolleary/PubSubClient@^2.8

; Serial monitor filter — strip escape codes if you pipe to file
monitor_filters = esp32_exception_decoder
